name: Keep CapGo Render Dashboard Alive

on:
  # Render free tier spins down free web services after 15 minutes with
  # no inbound traffic. Ping every 10 minutes to stay comfortably under
  # that window, accounting for GitHub's scheduling jitter (cron runs
  # aren't guaranteed to fire at the exact minute, especially at busy
  # times like the top of the hour).
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render dashboard manifest
        run: |
          # manifest.webmanifest is a stable, non-hashed static path
          # (unlike content-hashed JS chunks like capgo-XXXXXXXX.js,
          # which change on every frontend rebuild/deploy). Small,
          # cheap, and reliably present across redeploys.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            "https://capgo.onrender.com/manifest.webmanifest")
          echo "Render dashboard responded with HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Render service is awake"
          else
            echo "::warning::Render dashboard returned $STATUS — service may be cold-starting or down. Check https://dashboard.render.com"
          fi
