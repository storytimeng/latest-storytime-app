name: Keep Supabase Project Alive


on:

  # Supabase free tier pauses after 7 days of NO activity (no API calls + no dashboard visits).

  # One ping every 5 days = comfortable 2-day buffer.

  # Pro plan and above never pause, so disable this workflow if you upgrade.

  schedule:

    - cron: "0 0 */5 * *"

  workflow_dispatch:


jobs:

  ping:

    runs-on: ubuntu-latest

    steps:

      - name: Ping Supabase Auth health endpoint

        run: |

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \

            "https://xssneissyscmaibeoojq.supabase.co/auth/v1/health" \

            --max-time 30)

          echo "Supabase responded with HTTP $STATUS"

          if [ "$STATUS" = "200" ]; then

            echo "Supabase is alive"

          else

            echo "Supabase returned $STATUS — project may be paused. Restore from https://supabase.com/dashboard"

          fi

