name: Android Build

# ── Channel mapping (Capgo) ──────────────────────────────────────────────
# push to main     → debug APK  → Capgo channel: dev
# push to android  → debug APK  → Capgo channel: dev
# push tag v*      → release    → Capgo channel: production
# workflow_dispatch with build_type=release → Capgo channel: production
# pull_request (any branch) → debug APK, upload step is skipped in forks
#                              because secrets are not exposed there.
# ─────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - android
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - android
  workflow_dispatch:
    inputs:
      build_type:
        description: "Build type"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed for the release-creation step

jobs:
  build:
    name: Build Android APK (${{ github.event.inputs.build_type || (startsWith(github.ref, 'refs/tags/v') && 'release') || 'debug' }})
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: "22"
      JAVA_VERSION: "21"
      IS_RELEASE: ${{ github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install pnpm using the version declared in package.json's
      # "packageManager" field (single source of truth). Do NOT also pass
      # `version:` here — action-setup v4 errors if both are set, even when
      # the values match.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.local for build
        run: |
          # Fall back to https://back.storytime.ng if the GitHub variable
          # is unset/misscoped. The web app's heyapi-runtime.ts has the
          # same fallback, but baking it into the build env means the
          # resulting JS bundle is correct even on a misconfigured run.
          #
          # ANDROID_KEY_ALIAS is a vars (not a secret) — the alias is the
          # least-sensitive piece of signing material (just a label for
          # the key inside the .jks), and android/app/build.gradle
          # already falls back to android/keystore.properties
          # (keyAlias=storytime) when the env var is empty, so a missing
          # vars is non-fatal. The release build step below MUST read
          # from the same source as this line.
          API_URL="${{ vars.NEXT_PUBLIC_API_URL || 'https://back.storytime.ng' }}"
          cat > .env.local << EOF
          NEXT_PUBLIC_API_URL=${API_URL}
          NEXT_PUBLIC_BACKEND_URL=${API_URL}
          NEXT_PUBLIC_PLATFORM=android
          ANDROID_KEYSTORE_BASE64=${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS=${{ vars.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          NEXT_PUBLIC_DEBUG_PROXY=false
          NEXT_PUBLIC_PROXY=false
          EOF
          # Belt-and-braces: also export to the shell so the spawned
          # `next build` and the Gradle steps below inherit them even
          # if anything ever moves .env.local out of the way.
          echo "NEXT_PUBLIC_API_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_BACKEND_URL=${API_URL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PLATFORM=android" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_DEBUG_PROXY=false" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PROXY=false" >> $GITHUB_ENV

      # Warn (not fail) if NEXT_PUBLIC_API_URL is empty — the build still
      # proceeds with the back.storytime.ng fallback. If you want a hard
      # failure, change this back to `exit 1` and remove the `||` in the
      # env step above.
      - name: Verify required build vars are set
        run: |
          echo "── .env.local contents (secrets redacted below) ──"
          grep -v -E 'PASSWORD|BASE64' .env.local || true
          echo "──────────────────────────"
          if [ -z "${{ vars.NEXT_PUBLIC_API_URL }}" ]; then
            echo "::warning::NEXT_PUBLIC_API_URL repo/org Actions variable is empty or unset. Falling back to https://back.storytime.ng for this build."
          fi

      - name: Build Next.js static export
        run: node scripts/android-build.mjs --no-apk

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Capgo OTA upload ─────────────────────────────────────────────
      # Runs after the web build (so `out/` exists) and BEFORE the APK
      # assemble, so the APK can pull the freshly uploaded bundle on
      # first launch. Channel mapping (see top-of-file comment):
      #   • `main` or `android` branch push → dev
      #   • tag `v*` push                   → production
      #   • workflow_dispatch (release)     → production
      # The upload step is gated on CAPGO_API_KEY being set so fork
      # PRs (where secrets are not exposed) don't fail the build.
      - name: Determine Capgo channel
        id: capgo_channel
        run: |
          # IS_RELEASE is already set from the workflow-level env and is
          # true for: tag pushes (refs/tags/v*) OR manual build_type=release.
          if [ "${{ env.IS_RELEASE }}" = "true" ]; then
            echo "channel=production" >> "$GITHUB_OUTPUT"
            echo "::notice::Capgo channel: production (release / tag build)"
          else
            echo "channel=dev" >> "$GITHUB_OUTPUT"
            echo "::notice::Capgo channel: dev (debug build on ${{ github.ref_name }})"
          fi

      - name: Upload web bundle to Capgo
        if: secrets.CAPGO_API_KEY != ''
        env:
          # CAPGO_API_HOST tells the CLI where the self-hosted API lives
          # (your Supabase functions URL). The Supabase anon key + host
          # are read from capacitor.config.ts (CapacitorUpdater plugin
          # block), so we don't need to pass them here.
          CAPGO_API_KEY:  ${{ secrets.CAPGO_API_KEY }}
          CAPGO_API_HOST:  ${{ secrets.CAPGO_API_HOST }}
          # S3 credentials for direct S3 upload to Supabase Storage.
          # Required because the self-hosted Capgo "files" backend
          # (the part of Capgo that handles TUS / multipart bundle
          # uploads) is NOT deployed — the self-hosted setup at
          # capgo.onrender.com is the dashboard frontend only, while
          # the actual functions live at xssneissyscmaibeoojq.supabase.co.
          # Without these S3 flags, the CLI falls back to the default
          # files API (files.capgo.app) which then fails the upload.
          # With these flags, the CLI uploads the zip directly to
          # Supabase Storage and the device plugin downloads it
          # directly from there (via the external_url field). The
          # dashboard shows "No zip bundle" because the zip is in
          # your storage, not in Capgo's R2 — this is expected and
          # harmless; the auto-updater still works end-to-end.
          S3_ACCESS_KEY_ID:     ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET:            ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT:          ${{ secrets.S3_ENDPOINT }}
          S3_REGION:            ${{ secrets.S3_REGION }}
        run: |
          # --no-code-check is ONLY applied to dev-channel uploads so
          # debug nightlies can ship a new web bundle without bumping
          # the native version. Production uploads (tag pushes /
          # manual release) MUST run the compatibility check, otherwise
          # a broken bundle can reach real users.
          NO_CODE_CHECK=""
          if [ "${{ steps.capgo_channel.outputs.channel }}" = "dev" ]; then
            NO_CODE_CHECK="--no-code-check"
          fi
          npx --yes @capgo/cli@latest bundle upload \
            com.storytimeng \
            --apikey "$CAPGO_API_KEY" \
            --channel "${{ steps.capgo_channel.outputs.channel }}" \
            --path out \
            --s3-apikey "$S3_ACCESS_KEY_ID" \
            --s3-apisecret "$S3_SECRET_ACCESS_KEY" \
            --s3-bucket-name "$S3_BUCKET" \
            --s3-endpoint "$S3_ENDPOINT" \
            --s3-region "$S3_REGION" \
            $NO_CODE_CHECK \
            --comment "GitHub Actions build #${{ github.run_number }} on ${{ github.ref_name }}"

      # ── Decode keystore BEFORE gradle build, so signing config can find it ──
      - name: Decode keystore
        if: env.IS_RELEASE == 'true'
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > ${{ runner.temp }}/keystore.jks

      - name: Build Debug APK
        if: env.IS_RELEASE != 'true'
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: env.IS_RELEASE == 'true'
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          # ANDROID_KEY_ALIAS is a vars (not a secret) — must match the
          # .env.local step above. build.gradle falls back to
          # keystore.properties when this is empty, so a missing vars
          # is non-fatal.
          ANDROID_KEY_ALIAS: ${{ vars.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Debug APK
        if: env.IS_RELEASE != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: storytime-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload Release APK
        if: env.IS_RELEASE == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: storytime-release-${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── Only creates an actual GitHub Release on a version tag push ────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/*.apk
          generate_release_notes: true

      - name: Build summary
        if: always()
        run: |
          echo "## Android Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build type | \`${{ env.IS_RELEASE == 'true' && 'release' || 'debug' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | \`#${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
