name: Keep Backend Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://storytime-backend-1-0.onrender.com/health" \
            --max-time 30)
          echo "Backend responded with HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Backend is healthy"
          else
            echo "Backend returned $STATUS — may be waking up"
          fi
